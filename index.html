<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoGamer Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">NEO<span>GAMER</span></div>
    </nav>

    <div class="container">
        <aside class="sidebar">
            <div class="profile-card">
                <div class="avatar"></div>
                <h3>Ghost_Ninja</h3>
                <p>Pro Player</p>
                <div class="status-online">Online</div>
            </div>
        </aside>

        <main class="feed">
            <article class="card">
                <div class="card-header">
                    <strong>Cyber_Punk</strong> postou agora
                </div>
                <div class="card-body">
                    <p>Setup novo finalizado! O que acharam desse neon azul? 🎮</p>
                    <div class="game-img"></div>
                </div>
                <div class="card-footer">
                    <button class="btn-neon">LIKE</button>
                    <button class="btn-neon blue">SHARE</button>
                </div>
            </article>

            <article class="card">
                <div class="card-header">
                    <strong>Arena_Master</strong> postou há 1h
                </div>
                <div class="card-body">
                    <p>Buscando duo para subir de elo no Valorant. Chama na DM! 🔥</p>
                </div>
                <div class="card-footer">
                    <button class="btn-neon">LIKE</button>
                    <button class="btn-neon blue">SHARE</button>
                </div>
            </article>
        </main>
    </div>

</body>
</html>
